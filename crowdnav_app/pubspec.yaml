name: crowdnav_app
description: "CrowdNav - Smart Crowd-Powered Navigation"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  
  # HTTP & Networking
  http: ^1.2.1
  
  # Location
  geolocator: ^13.0.2
  
  # State Management
  provider: ^6.1.2
  
  # Storage
  shared_preferences: ^2.3.3
  
  # Utils
  uuid: ^4.5.1
  intl: ^0.19.0
  
  # Animations
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
